<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="visibility:hidden;">

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>ShopEase</h1>
            </div>

            <input type="checkbox" id="nav-check" class="nav-checkbox">
            <label for="nav-check" class="nav-toggle-label">☰</label>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html" class="active">Cart <span id="cart-count" class="cart-count">0</span></a></li>
                <li><span class="nav-auth-links" id="nav-auth">
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
</span></li>
            </ul>
        </nav>
    </header>

    <!-- Cart -->
    <section class="cart">

        <h2>Shopping Cart</h2>

        <div id="cart-logged-out" class="cart-empty" style="display:none;">
            <p>Log in to see your cart.</p>
            <a href="login.html" class="btn">Login</a>
        </div>

        <div id="cart-empty" class="cart-empty" style="display:none;">
            <p>Your cart is empty.</p>
            <a href="products.html" class="btn">Continue Shopping</a>
        </div>

        <div id="cart-table-wrap">

            <table class="cart-table">

                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody id="cart-body">
                    <!-- Rendered dynamically by js/cart-page.js -->
                </tbody>

            </table>

            <div class="cart-summary">
                <h3>Grand Total: <span id="grand-total">₹0</span></h3>

                <a href="checkout.html" class="btn">
                    Proceed to Checkout
                </a>
            </div>

        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 ShopEase. All Rights Reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/cart-page.js"></script>
    

</body>
</html>
