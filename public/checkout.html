<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>ShopEase</h1>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart <span id="cart-count" class="cart-count">0</span></a></li>
                <li><span class="nav-auth-links" id="nav-auth">
                    <a href="login.html">Login</a>
                    <a href="register.html">Register</a>
                </span></li>
            </ul>
        </nav>
    </header>

    <!-- Checkout Form -->
    <section class="checkout-container">

        <div class="checkout-box">

            <h2>Checkout</h2>

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div id="summary-body"><!-- Rendered by js/checkout.js --></div>
                <div class="summary-row summary-total-row">
                    <span>Total</span>
                    <span id="summary-total">₹0</span>
                </div>
            </div>

            <p id="checkout-error" class="form-error"></p>

            <form id="checkout-form">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="checkout-name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="checkout-email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="checkout-phone" placeholder="Enter your phone number" required>
                </div>

                <div class="input-group">
                    <label>Delivery Address</label>
                    <textarea id="checkout-address" placeholder="Enter your address" rows="4" required></textarea>
                </div>

                <div class="input-group">
                    <label>Payment Method</label>

                    <select id="checkout-payment" required>
                        <option>Cash on Delivery</option>
                        <option>UPI</option>
                        <option>Debit Card</option>
                        <option>Credit Card</option>
                    </select>
                </div>

                <button type="submit" class="btn">
                    Place Order
                </button>

            </form>

        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 ShopEase. All Rights Reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/checkout.js"></script>
    

</body>
</html>
