<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Product Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="visibility:hidden;">

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>ShopEase</h1>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart <span id="cart-count" class="cart-count">0</span></a></li>
                <li><span class="nav-auth-links" id="nav-auth">
                    <a href="login.html">Login</a>
                    <a href="register.html">Register</a>
                </span></li>
            </ul>
        </nav>
    </header>

    <!-- Product Details -->
    <section class="product-details">

        <div class="product-image">
            <img src="images/headphones.jpg" alt="Wireless Headphones">
        </div>

        <div class="product-info">
            <h2>Wireless Headphones</h2>

            <h3 class="price">₹2,499</h3>

            <p>
                Enjoy crystal-clear sound with these wireless headphones.
                They feature Bluetooth connectivity, long battery life,
                and a comfortable over-ear design for everyday use.
            </p>

            <div class="quantity">
                <label for="qty">Quantity:</label>
                <input type="number" id="qty" value="1" min="1">
            </div>

            <button class="btn" id="add-to-cart">Add to Cart</button>

        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 ShopEase. All Rights Reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/product.js"></script>
    
</body>
</html>
