<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>ShopEase</h1>
            </div>

            <input type="checkbox" id="nav-check" class="nav-checkbox">
            <label for="nav-check" class="nav-toggle-label">☰</label>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart <span id="cart-count" class="cart-count">0</span></a></li>
                <li><span class="nav-auth-links" id="nav-auth">
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
</span></li>
            </ul>
        </nav>
    </header>

    <!-- Register Form -->
    <section class="auth-container">

        <div class="auth-box">
            <h2>Create Account</h2>

            <p id="register-error" class="form-error"></p>

            <form id="register-form">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn">Register</button>

                <p class="auth-link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </form>
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 ShopEase. All Rights Reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    

</body>
</html>
